query CartValidationsGenerateRunInput {
  buyerJourney {
    step
  }
  cart {
    buyerIdentity {
      customer {
        hasTags(tags: ["gwp-test"]) {
          hasTag
          tag
        }
      }
    }

    cost {
      totalAmount {
        amount
        currencyCode
      }
    }

    lines {
      cost {
        totalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            id
          }
        }
      }
    }
  }
}