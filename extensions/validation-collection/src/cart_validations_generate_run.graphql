query CartValidationsGenerateRunInput {
  buyerJourney {
    step
  }
  shop {
    localTime {
      isCampaignPeriod: dateTimeBetween(
        startDateTime: "2026-06-08T16:20:00"
        endDateTime: "2026-06-12T07:00:00"
      )
    }
    metaobject(handle: { type: "app--368442998785--gwp", handle: "app--368442998785--gwp-zzn4bdst" }) {
      condition_type: field(key: "condition_type") { value }
    }
  }
  cart {
    buyerIdentity {
      customer {
        hasTags(tags: ["gwp-test"]) {
          hasTag
          tag
        }
      }
    }
    cost {
      totalAmount {
        amount
        currencyCode
      }
    }
    lines {
      cost {
        totalAmount {
          amount
        }
      }
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            id
            inCollections(ids: [ "gid://shopify/Collection/499615138106", "gid://shopify/Collection/447626903866"]) {
              collectionId
              isMember
            }
          }
        }
      }
    }
  }
}